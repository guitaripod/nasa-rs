name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run clippy
      run: cargo clippy --all-features -- -D warnings
    
    - name: Run tests
      run: cargo test --all-features
    
    - name: Build worker
      run: cargo build --release
    
    - name: Build CLI
      run: cargo build --release --features cli

  release:
    name: Create Release
    needs: test
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build --release --features cli --bin nasa-cli

      - name: Package binary
        run: |
          mkdir -p nasa-cli-x86_64-unknown-linux-gnu
          cp target/release/nasa-cli nasa-cli-x86_64-unknown-linux-gnu/
          cp README.md LICENSE nasa-cli-x86_64-unknown-linux-gnu/
          tar czf nasa-cli-x86_64-unknown-linux-gnu.tar.gz nasa-cli-x86_64-unknown-linux-gnu

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: nasa-cli-x86_64-unknown-linux-gnu.tar.gz
          body: |
            ## ${{ github.ref_name }} — Self-hostable

            The `nasa` CLI no longer ships with a default backend. Deploy your own
            Cloudflare Worker (see the [self-hosting guide](https://github.com/${{ github.repository }}#self-hosting))
            and point the CLI at it:

            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/nasa-cli-x86_64-unknown-linux-gnu.tar.gz | tar xz
            nasa-cli-x86_64-unknown-linux-gnu/nasa-cli config set api_endpoint https://your-worker.workers.dev
            ```